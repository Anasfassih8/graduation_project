<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Traffic Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  overflow: hidden;
}

.container {
  padding: 15px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* GRID LAYOUT */
.top {
  display: grid;
  grid-template-columns: 1fr 1fr 250px;
  gap: 10px;
}

.bottom {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  flex: 1;
}

/* CARDS */
.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* SUMMARY */
.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.metric {
  font-size: 1.3em;
  font-weight: bold;
}

/* SEGMENTS */
.segments {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  max-height: 250px;
  overflow-y: auto;
}

.segment.low { border-left: 5px solid #22c55e; }
.segment.medium { border-left: 5px solid #facc15; }
.segment.high { border-left: 5px solid #ef4444; }

/* CHARTS */
canvas {
  width: 100% !important;
  height: 180px !important;
}

.traffic-light {
  width: 50px;
  padding: 8px;
  background: #111;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.light {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  opacity: 0.2;
}

.red { background: #ef4444; }
.yellow { background: #facc15; }
.green { background: #22c55e; }

.light.active {
  opacity: 1;
  box-shadow: 0 0 8px rgba(255,255,255,0.6);
}
</style>
</head>
<body>
<div class="container">

  <!-- TOP SECTION -->
  <div class="top">

    <!-- SUMMARY -->
    <div class="card">
      <h3>Overview</h3>
      <div id="summaryCards" class="cards"></div>
    </div>

    <!-- SEGMENTS -->
    <div class="card">
      <h3>Segments</h3>
      <div id="segments" class="segments"></div>
    </div>

    <div class="card">
      <h3>Traffic Light</h3>

      <div style="display:flex; align-items:center; gap:15px;">

        <div class="traffic-light">
          <div id="redLight" class="light red"></div>
          <div id="yellowLight" class="light yellow"></div>
          <div id="greenLight" class="light green"></div>
        </div>

        <div>
          <div id="lightState">STATE: --</div>
          <div id="lightTimer">Time: --</div>
          <div id="lightNext">Next: --</div>
        </div>

    </div>
</div>

  </div>

  <!-- BOTTOM SECTION (CHARTS) -->
  <div class="bottom">

    <div class="card">
      <h3>Congestion</h3>
      <canvas id="barChart"></canvas>
    </div>

    <div class="card">
      <h3>Speed Trend</h3>
      <canvas id="speedChart"></canvas>
    </div>

    <div class="card">
      <h3>Congestion Trend</h3>
      <canvas id="congestionChart"></canvas>
    </div>

  </div>

</div>

<script>
// ================= MOCK DATA =================
function getMockData() {
  return Array.from({ length: 6 }, (_, i) => ({
    segmentId: i,
    vehicleCount: Math.floor(Math.random() * 50),
    avgSpeed: Math.floor(Math.random() * 80),
    density: Math.random() * 100,
    congestionIndex: Math.random(),
    recommendedSpeed: Math.floor(Math.random() * 60)
  }));
}

// ================= UTILITIES =================
function getCongestionLevel(index) {
  if (index < 0.4) return 'low';
  if (index < 0.7) return 'medium';
  return 'high';
}

// ================= SUMMARY =================
function renderSummary(data) {
  const totalVehicles = data.reduce((sum, s) => sum + s.vehicleCount, 0);
  const avgSpeed = (data.reduce((sum, s) => sum + s.avgSpeed, 0) / data.length).toFixed(1);
  const avgCongestion = (data.reduce((sum, s) => sum + s.congestionIndex, 0) / data.length).toFixed(2);

  // NEW: overall recommended speed (street-level)
  const overallRecommended = (data.reduce((sum, s) => sum + s.recommendedSpeed, 0) / data.length).toFixed(1);

  const worst = data.reduce((max, s) => s.congestionIndex > max.congestionIndex ? s : max);

  const cards = [
    { label: 'Total Vehicles', value: totalVehicles },
    { label: 'Average Speed', value: avgSpeed + ' km/h' },
    { label: 'Avg Congestion', value: avgCongestion },
    { label: 'Recommended Speed', value: overallRecommended + ' km/h' },
    { label: 'Worst Segment', value: 'Segment ' + worst.segmentId }
  ];

  const container = document.getElementById('summaryCards');
  container.innerHTML = cards.map(c => `
    <div class="card">
      <div>${c.label}</div>
      <div class="metric">${c.value}</div>
    </div>
  `).join('');
}

// ================= SEGMENTS =================
function renderSegments(data) {
  const container = document.getElementById('segments');
  container.innerHTML = data.map(s => {
    const level = getCongestionLevel(s.congestionIndex);
    return `
      <div class="card segment ${level}">
        <h3>Segment ${s.segmentId}</h3>
        <p>Vehicles: ${s.vehicleCount}</p>
        <p>Speed: ${s.avgSpeed} km/h</p>
        <p>Congestion: ${(s.congestionIndex * 100).toFixed(0)}%</p>
        <p>Recommended: ${s.recommendedSpeed} km/h</p>
      </div>
    `;
  }).join('');
}

// ================= CHARTS =================
let barChart, speedChart, congestionChart;

function initCharts() {
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: [], datasets: [{ label: 'Congestion', data: [] }] },
  });

  speedChart = new Chart(document.getElementById('speedChart'), {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Avg Speed', data: [] }] },
  });

  congestionChart = new Chart(document.getElementById('congestionChart'), {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Congestion Over Time', data: [] }] },
  });
}

const history = {
  time: [],
  speed: [],
  congestion: []
};

function updateCharts(data) {
  const labels = data.map(s => 'Seg ' + s.segmentId);
  const congestion = data.map(s => s.congestionIndex);

  barChart.data.labels = labels;
  barChart.data.datasets[0].data = congestion;
  barChart.update();

  const avgSpeed = data.reduce((sum, s) => sum + s.avgSpeed, 0) / data.length;
  const avgCong = data.reduce((sum, s) => sum + s.congestionIndex, 0) / data.length;

  const timeLabel = new Date().toLocaleTimeString();

  history.time.push(timeLabel);
  history.speed.push(avgSpeed);
  history.congestion.push(avgCong);

  if (history.time.length > 10) {
    history.time.shift();
    history.speed.shift();
    history.congestion.shift();
  }

  speedChart.data.labels = history.time;
  speedChart.data.datasets[0].data = history.speed;
  speedChart.update();

  congestionChart.data.labels = history.time;
  congestionChart.data.datasets[0].data = history.congestion;
  congestionChart.update();
}

// ================= DATA FETCH =================

async function fetchData() {
  const res = await fetch("http://localhost:5052/api/traffic/segments");
  const raw = await res.json();

  const map = new Map();

  raw.forEach(s => {
    map.set(s.segmentId, s); // keeps latest
  });

  return Array.from(map.values()).map(s => ({
    segmentId: s.segmentId,
    vehicleCount: s.vehicleCount || 0,
    avgSpeed: s.avgSpeed,
    density: s.density,
    congestionIndex: s.congestionIndex,
    recommendedSpeed: s.recommendedSpeed
  }));
}

let currentTimer = 0;
let countdownInterval = null;

async function fetchLight() {
  const res = await fetch("http://localhost:5052/api/traffic/light");
  return await res.json();
}

function renderTrafficLight(light) {
  if (!light) return;

  const red = document.getElementById("redLight");
  const yellow = document.getElementById("yellowLight");
  const green = document.getElementById("greenLight");

  red.classList.remove("active");
  yellow.classList.remove("active");
  green.classList.remove("active");

  if (light.state === "RED") red.classList.add("active");
  if (light.state === "YELLOW") yellow.classList.add("active");
  if (light.state === "GREEN") green.classList.add("active");

  document.getElementById("lightState").innerText = "STATE: " + light.state;
  document.getElementById("lightNext").innerText = "Next: " + light.nextState;

  const now = new Date();
  const start = new Date(light.timeStamp + "Z");
  const elapsed = Math.floor((now - start) / 1000);

  const remaining = Math.max(0, light.duration - elapsed);
  currentTimer = remaining;

  console.log("NOW:", now);
  console.log("START:", start);
  console.log("ELAPSED:", elapsed);
  console.log("REMAINING:", remaining);
  console.log("RAW TIMESTAMP:", light.timeStamp);

  document.getElementById("lightTimer").innerText =
  "Time: " + remaining + " s";
  
  if (
    window.lastState !== light.state ||
    window.lastTimestamp !== light.timeStamp
  ) {
    window.lastState = light.state;
    window.lastTimestamp = light.timeStamp;
    
    if (countdownInterval) clearInterval(countdownInterval);
    
    currentTimer = remaining;
    
    countdownInterval = setInterval(() => {
      if (currentTimer <= 0) {
        document.getElementById("lightTimer").innerText = "Time: 0 s";
        return;
      }

      document.getElementById("lightTimer").innerText =
        "Time: " + currentTimer + " s";

      currentTimer--;
    }, 1000);

  
}
}


// ================= MAIN =================
async function updateDashboard() {
  const data = await fetchData();
  const light = await fetchLight();
  renderSummary(data);
  renderSegments(data);
  updateCharts(data);
  renderTrafficLight(light);
}

function init() {
  initCharts();
  updateDashboard();
  setInterval(updateDashboard, 5000);
}

init();
</script>
</body>
</html>
